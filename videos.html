<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Videos - PhotoRoast</title>
<script src="error-handler.js"></script>
<script src="public-header.js" defer></script>
<link rel="stylesheet" href="style.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
padding:92px 16px 28px;
background:#ffffff;
color:#171717;
}

.page-shell{
width:100%;
max-width:1180px;
margin:0 auto;
}

.topbar{
display:flex;
align-items:center;
justify-content:flex-start;
gap:14px;
margin-bottom:24px;
}

h1{
font-size:30px;
line-height:1.1;
font-family:Georgia,'Times New Roman',serif;
}

.videos-grid{
display:grid;
grid-template-columns:1fr;
gap:18px;
}

.video-card{
overflow:hidden;
background:#ffffff;
border:1px solid var(--line);
box-shadow:0 16px 42px rgba(0,0,0,.08);
}

.video-media{
width:100%;
aspect-ratio:16/10;
background:#f1f1ed;
display:block;
}

.video-media video,
.video-media iframe{
width:100%;
height:100%;
border:0;
display:block;
object-fit:cover;
}

.video-content{
padding:16px;
}

.video-content h3{
font-size:18px;
margin-bottom:8px;
}

.video-content p{
font-size:14px;
line-height:1.7;
color:var(--text-soft);
}

.empty{
padding:28px;
text-align:center;
background:#ffffff;
border:1px solid var(--line);
color:var(--text-soft);
}

@media(min-width:768px){
body{
padding:104px 24px 36px;
}

h1{
font-size:42px;
}

.videos-grid{
grid-template-columns:repeat(2,minmax(0,1fr));
}
}

@media(min-width:1100px){
.videos-grid{
grid-template-columns:repeat(3,minmax(0,1fr));
}
}
</style>
</head>

<body>
<div class="page-shell">
<div class="topbar">
<h1>Videos</h1>
</div>

<div class="videos-grid" id="videosGrid">
<div class="empty">Loading videos...</div>
</div>
</div>

<script>
function convertEmbed(url){
if(!url){
return "";
}

let videoId = "";

if(url.includes("youtu.be/")){
videoId = url.split("youtu.be/")[1].split("?")[0];
}else if(url.includes("watch?v=")){
videoId = url.split("watch?v=")[1].split("&")[0];
}else if(url.includes("/shorts/")){
videoId = url.split("/shorts/")[1].split("?")[0];
}else if(url.includes("/embed/")){
return url;
}

return `https://www.youtube.com/embed/${videoId}?rel=0`;
}

function escapeText(value){
return String(value || "")
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#039;");
}

function renderVideos(items){
const grid = document.getElementById("videosGrid");
const videos =
(items || []).filter(item=>{
const category = String(item.category || "").trim().toLowerCase();
return category !== "reels" && (item.type === "video" || item.type === "youtube" || item.youtube);
});

if(videos.length===0){
grid.innerHTML = `<div class="empty">No video uploaded</div>`;
return;
}

grid.innerHTML = videos.map(item=>{
const isYoutube = item.type === "youtube" || item.youtube;
const media = isYoutube
? `
<iframe
src="${convertEmbed(item.youtube)}"
title="Video"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
referrerpolicy="strict-origin-when-cross-origin"
allowfullscreen>
</iframe>
`
: `
<video controls>
<source src="/uploads/${item.filename}">
</video>
`;

return `
<article class="video-card">
<div class="video-media">${media}</div>
<div class="video-content">
<h3>${escapeText(item.title || "Untitled Video")}</h3>
<p>${escapeText(item.description || "")}</p>
</div>
</article>
`;
}).join("");
}

async function loadVideos(){
try{
const res = await fetch("/videos?t=" + Date.now());
const data = await res.json();

if(!res.ok){
throw new Error(data.message || "Videos load failed");
}

renderVideos(data);
}catch(err){
document.getElementById("videosGrid").innerHTML =
`<div class="empty">${err.message || "Videos load failed"}</div>`;
}
}

loadVideos();
</script>
</body>
</html>
