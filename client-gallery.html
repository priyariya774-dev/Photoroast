<script>


const categories = [
{
label:"Wedding",
aliases:["Wedding"]
},
{
label:"Pre wedding",
aliases:["Pre wedding","Pre-wedding","Prewedding"]
},
{
label:"Post wedding",
aliases:["Post wedding","Post-wedding","Postwedding"]
},
{
label:"Reception",
aliases:["Reception"]
},
{
label:"Private Events",
aliases:["Private Events","Private Event","Private"]
},
{
label:"Birthday party",
aliases:["Birthday party","Birthday Party","Birthday"]
}
];

let allMedia = [];
let categoryCoverMap = {};
let activeCategory = "";
let activeAdminCategory = "";
let activeAdminPhotoId = null;
const isFeaturedMode =
new URLSearchParams(window.location.search).get("featured") === "1";
const isGalleryAdminMode =
localStorage.getItem("auth") === "true"
&&
new URLSearchParams(window.location.search).get("adminEdit") === "1";
let selectedFeaturedIds = [];

if(isFeaturedMode){
document.body.classList.add("featured-mode");
}

if(isGalleryAdminMode){
document.getElementById("galleryAdminTop").classList.add("show");
}

function normalizeCategory(value){
return String(value || "")
.trim()
.toLowerCase()
.replace(/[\s_-]+/g," ");
}

function escapeHtml(value){
return String(value || "")
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#039;");
}

function escapeJs(value){
return String(value || "").replace(/\\/g,"\\\\").replace(/'/g,"\\'");
}

function showAdminDialog(title,content){
const dialog = document.getElementById("galleryAdminDialog");

dialog.innerHTML = `
<div class="gallery-admin-panel">
<h3>${title}</h3>
${content}
<div class="gallery-admin-actions">
<button type="button" data-admin-close>Close</button>
</div>
</div>
`;

dialog.classList.add("show");
}

function closeAdminDialog(){
const dialog = document.getElementById("galleryAdminDialog");
dialog.classList.remove("show");
dialog.innerHTML = "";
}

function closeAdminMenu(){
document.getElementById("galleryAdminMenu").classList.remove("show");
}

function openPhotoViewer(photoId){
if(isFeaturedMode){
return;
}

const photo =
allMedia.find(item=>Number(item.id) === Number(photoId));

if(!photo || !photo.filename){
return;
}

document.getElementById("photoViewerImage").src =
"/uploads/" + photo.filename;
document.getElementById("photoViewerTitle").innerText =
photo.title || photo.category || "Gallery image";
document.getElementById("photoViewerText").innerText =
photo.description || "";
document.getElementById("photoViewer").classList.add("show");
}

function closePhotoViewer(){
document.getElementById("photoViewer").classList.remove("show");
document.getElementById("photoViewerImage").src = "";
}

async function readJsonResponse(res){
const data = await res.json().catch(()=>({}));

if(!res.ok){
throw new Error(data.message || "Update failed");
}

return data;
}

async function uploadCategoryFiles(category,files){
const formData = new FormData();

files.forEach(file=>formData.append("galleryImages",file));
formData.append("category",category);
formData.append("title",category);
formData.append("description","");

const res = await fetch("/upload-gallery",{
method:"POST",
body:formData
});

return readJsonResponse(res);
}

function getCategoryConfig(category){
return categories.find(item=>item.label === category) || {
label:category,
aliases:[category]
};
}

function isInCategory(media,category){
const config = getCategoryConfig(category);
const mediaCategory = normalizeCategory(media.category);

return config.aliases.some(alias=>
normalizeCategory(alias) === mediaCategory
);
}

function getCategoryMedia(category){
return allMedia.filter(item=>
isInCategory(item,category)
&&
(item.type === "photo" || item.type === "image")
);
}

function getVisibleCategories(){
const visibleCategories = [...categories];

allMedia.forEach(item=>{
if(!(item.type === "photo" || item.type === "image")){
return;
}

const itemCategory = item.category || "General";
const alreadyListed =
visibleCategories.some(categoryItem=>
categoryItem.aliases.some(alias=>
normalizeCategory(alias) === normalizeCategory(itemCategory)
)
);

if(!alreadyListed){
visibleCategories.push({
label:itemCategory,
aliases:[itemCategory]
});
}
});

return visibleCategories.filter(categoryItem=>
getCategoryMedia(categoryItem.label).length > 0
);
}

function renderCategoryTabs(){
const tabs =
document.getElementById("categoryTabs");

tabs.innerHTML = "";

getVisibleCategories().forEach(categoryItem=>{
const category = categoryItem.label;
const cover =
getCategoryCover(category);
const count =
getCategoryMedia(category).length;
const countText =
isFeaturedMode ? `<small>${count} upload${count === 1 ? "" : "s"}</small>` : "";
const adminMenuButton =
isGalleryAdminMode
? `<button type="button" class="category-more" onclick="openCategoryAdminMenu(event,'${escapeJs(category)}')" aria-label="Manage ${escapeHtml(category)}">...</button>`
: "";

tabs.innerHTML += `
<div
class="category-card ${category === activeCategory ? 'active' : ''}"
role="button"
tabindex="0"
onclick="showCategory('${escapeJs(category)}')">
${cover ? `<img src="${cover}" alt="${category}">` : ""}
${adminMenuButton}
<span>
${category}
${countText}
</span>
</div>
`;
});

if(tabs.innerHTML === ""){
tabs.innerHTML = `
<div class="empty">
No gallery images uploaded yet
</div>
`;
}
}

function getCategoryCover(category){
const chosenCover =
categoryCoverMap[normalizeCategory(category)];

if(chosenCover){
return "/uploads/" + chosenCover;
}

const categoryMedia =
allMedia.find(item=>
isInCategory(item,category)
&&
item.filename
&&
item.type !== "video"
);

if(categoryMedia){
return "/uploads/" + categoryMedia.filename;
}

const anyMedia =
allMedia.find(item=>
isInCategory(item,category)
&&
item.filename
);

if(anyMedia){
return "/uploads/" + anyMedia.filename;
}

return "";
}

async function loadCategoryCovers(){
try{
const res =
await fetch("/category-covers?t=" + new Date().getTime());

const data =
await res.json();

categoryCoverMap = {};

data.forEach(item=>{
if(item.filename){
categoryCoverMap[normalizeCategory(item.category)] = item.filename;
}
});

}catch(err){
console.log(err);
categoryCoverMap = {};
}
}

function showCategory(category){
activeCategory = category;
document.getElementById("categoryTabs").style.display = "none";
document.getElementById("categoryDetail").classList.add("show");
document.getElementById("categoryTitle").innerText = category;
updateFeaturedBar();
renderGallery();
document.getElementById("gallery").scrollIntoView({
behavior:"smooth",
block:"start"
});
}

function showCategories(){
activeCategory = "";
document.getElementById("categoryTabs").style.display = "grid";
document.getElementById("categoryDetail").classList.remove("show");
document.getElementById("gallery").innerHTML = "";
updateFeaturedBar();
}

function openPhotoAdminMenu(event,photoId){
if(!isGalleryAdminMode){
return;
}

event.preventDefault();
event.stopPropagation();

activeAdminPhotoId = Number(photoId);

const menu = document.getElementById("galleryAdminMenu");

<button type="button" data-gallery-action="set-hero">Set as hero image</button>

`;

menu.style.left =
Math.min(event.clientX,window.innerWidth - 240) + "px";
menu.style.top =
Math.min(event.clientY,window.innerHeight - 180) + "px";
menu.classList.add("show");

function openCategoryUploadDialog(category){
showAdminDialog(
"Upload New Image",
`
<p>Add a new image inside ${escapeHtml(category)}.</p>
<input id="galleryCategoryUploadInput" type="file" accept="image/*" multiple>
<div id="galleryCategoryUploadBody"></div>
<div class="gallery-admin-actions">
<button type="button" data-gallery-dialog-action="save-category-upload">Upload image</button>
</div>
`
);
}

function openCoverDialog(category){
const photos = getCategoryMedia(category);

showAdminDialog(
"Change Display Image",
`
<p>Choose one image from ${escapeHtml(category)}, or upload a new display image.</p>
<input id="galleryCoverUploadInput" type="file" accept="image/*" hidden>
<div class="gallery-admin-actions">
<button type="button" data-gallery-dialog-action="upload-cover-file">Upload new display image</button>
</div>
<div class="gallery-choice-grid">
${photos.map(photo=>`
<button type="button" data-cover-photo-id="${photo.id}">
<img src="/uploads/${photo.filename}" alt="">
<span>${escapeHtml(photo.title || photo.category || "Gallery image")}</span>
</button>
`).join("")}
</div>
`
);
}

async function reloadGallery(){
const res = await fetch("/photos?t=" + Date.now());
allMedia =
(await readJsonResponse(res)).filter(item=>
item.type === "photo" || item.type === "image"
);
await loadCategoryCovers();
renderCategoryTabs();

if(activeCategory){
renderGallery();
}
}

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
photoId,
heading:"PhotoRoast",
description:"Where every frame feels like a memory worth keeping"

const data = await readJsonResponse(res);
alert(data.message || "Image set as hero image");

async function setPhotoAsFeatured(photoId){
const res = await fetch("/featured-image/" + photoId,{
method:"POST"
});

const data = await readJsonResponse(res);
alert(data.message || "Image set as featured image");
}



// =====================
// YOUTUBE CONVERTER
// =====================

function convertYoutube(url){

if(!url){
return "";

}

let videoId = "";


// SHORT URL

if(url.includes("youtu.be/")){

videoId =

url
.split("youtu.be/")[1]
.split("?")[0];

}


// NORMAL URL

else if(url.includes("watch?v=")){

videoId =

url
.split("watch?v=")[1]
.split("&")[0];

}


// SHORTS

else if(url.includes("/shorts/")){

videoId =

url
.split("/shorts/")[1]
.split("?")[0];

}


// EMBED URL

else if(url.includes("/embed/")){

return url;

}

const embedUrl =

`https://www.youtube.com/embed/${videoId}?rel=0`;

return embedUrl;

}

function setMediaRatio(media){
const box =
media.closest(".media-box");

if(!box){
return;
}

const width =
media.naturalWidth || media.videoWidth || 0;

const height =
media.naturalHeight || media.videoHeight || 0;

box.classList.remove("portrait","cinematic");
box.style.aspectRatio = "";

if(width && height && window.matchMedia("(min-width: 768px)").matches){
box.style.aspectRatio = `${width} / ${height}`;
return;
}

if(height > width){
box.classList.add("portrait");
return;
}

box.classList.add("cinematic");
}

window.addEventListener("resize",function(){
document.querySelectorAll(".media").forEach(media=>{
setMediaRatio(media);
});
});

function isSelectableFeaturedImage(item){
return item.filename && (item.type === "photo" || item.type === "image");
}

function updateFeaturedBar(){
const bar =
document.getElementById("featuredSaveBar");

if(!isFeaturedMode){
bar.classList.remove("show");
return;
}

bar.classList.add("show");
document.getElementById("featuredCount").innerText =
selectedFeaturedIds.length + " / 5 selected for Featured Gallery";
}

function toggleFeaturedImage(id){
if(!isFeaturedMode){
return;
}

const media =
allMedia.find(item=>Number(item.id) === Number(id));

if(!media || !isSelectableFeaturedImage(media)){
alert("Please choose only image uploads for featured gallery");
return;
}

if(selectedFeaturedIds.includes(id)){
selectedFeaturedIds =
selectedFeaturedIds.filter(item=>item !== id);
}else{
if(selectedFeaturedIds.length>=5){
alert("Only 5 images can be shown in featured gallery");
return;
}

selectedFeaturedIds.push(id);
}

updateFeaturedBar();
renderGallery();
}

async function saveFeaturedImages(){
if(!isFeaturedMode){
return;
}

if(selectedFeaturedIds.length===0){
alert("Please choose featured images first");
return;
}

try{
const res =
await fetch("/featured-images",{
method:"PUT",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
ids:selectedFeaturedIds
})
});

const data =
await readJsonResponse(res);

alert(data.message || "Featured images updated");

}catch(err){
console.log(err);
alert("Featured images update failed");
}
}

async function loadFeaturedSelection(){
if(!isFeaturedMode){
return;
}

try{
const res =
await fetch("/featured-images?t=" + new Date().getTime());

const data =
await readJsonResponse(res);

selectedFeaturedIds =
data.map(item=>Number(item.id));

updateFeaturedBar();

}catch(err){
console.log(err);
}
}




// =====================
// RENDER GALLERY
// =====================

function renderGallery(){
const g =

document.getElementById(
"gallery"
);

g.innerHTML="";

if(!activeCategory){
return;
}

const filtered =
getCategoryMedia(activeCategory);

if(!filtered || filtered.length===0){

g.innerHTML = `

<div class="empty">

No ${activeCategory} media uploaded

</div>

`;

return;

}

filtered.forEach(p=>{

let media = "";


// =====================
// YOUTUBE
// =====================

if(
p.youtube
||
p.type==="youtube"
){

const embedUrl =

convertYoutube(
p.youtube
);

media = `

<iframe

src="${embedUrl}"

title="YouTube video player"

allow="
accelerometer;
autoplay;
clipboard-write;
encrypted-media;
gyroscope;
picture-in-picture;
web-share
"

referrerpolicy="strict-origin-when-cross-origin"

allowfullscreen>

</iframe>

`;

}


// =====================
// VIDEO
// =====================

else if(
p.type==="video"
){

media = `

<div class="media-box">

<video
controls
playsinline
preload="metadata"
src="/media-file/${p.id}"
class="media"
onloadedmetadata="setMediaRatio(this)"
onerror="this.closest('.media-box').innerHTML='<div class=&quot;empty&quot;>This uploaded video cannot play. Please re-upload as MP4 H.264.</div>'"

style="
transform:
translate(${p.posX || 0}px,
${p.posY || 0}px)
scale(${p.scale || 1});
"

>

</video>

</div>

`;

}


// =====================
// IMAGE
// =====================

else{

media = `

<div class="media-box">

<img

class="media"
onload="setMediaRatio(this)"

src=
"/uploads/${p.filename}"

alt="${p.title || ""}"

style="
transform:
translate(${p.posX || 0}px,
${p.posY || 0}px)
scale(${p.scale || 1});
"

>

</div>

`;

}


g.innerHTML += `

<div
class="card ${selectedFeaturedIds.includes(Number(p.id)) ? 'selected' : ''}"
data-photo-id="${p.id}"
${isGalleryAdminMode ? `oncontextmenu="openPhotoAdminMenu(event,${p.id})"` : ""}
${isFeaturedMode ? `onclick="toggleFeaturedImage(${p.id})"` : `onclick="openPhotoViewer(${p.id})"`}>

<div class="select-badge">
${selectedFeaturedIds.includes(Number(p.id)) ? "Selected" : "Select"}
</div>

${media}

<div class="card-content">

<h3>

${p.title || ""}

</h3>

<p>

${p.description || ""}

</p>

<p>
${p.category || ""}
</p>

</div>

</div>

`;

});
}

// =====================
// LOAD GALLERY
// =====================

async function load(){

try{

const res =

await fetch(
"/photos"
);

allMedia =
(await res.json()).filter(item=>
item.type === "photo" || item.type === "image"
);

await loadCategoryCovers();
await loadFeaturedSelection();
renderCategoryTabs();
showCategories();

}catch(err){

console.error(err);

alert(
"Gallery Load Failed"
);

}

}


load();

document.getElementById("galleryAdminMenu").addEventListener("click",async function(event){
const action = event.target.dataset.galleryAction;

if(!action){
return;
}

closeAdminMenu();

try{
if(action === "upload-category"){
openCategoryUploadDialog(activeAdminCategory);
return;
}

if(action === "change-cover"){
openCoverDialog(activeAdminCategory);
return;
}

if(action === "delete-photo"){
if(!confirm("Delete this gallery image?")){
return;
}

const res = await fetch("/delete/" + activeAdminPhotoId,{
method:"DELETE"
});

const data = await readJsonResponse(res);
alert(data.message || "Gallery image deleted");
await reloadGallery();
return;
}

if(action === "set-hero"){
await setPhotoAsHero(activeAdminPhotoId);
return;
}

if(action === "set-featured"){
await setPhotoAsFeatured(activeAdminPhotoId);
await loadFeaturedSelection();
return;
}
}catch(err){
alert(err.message || "Update failed");
}
});

document.getElementById("galleryAdminDialog").addEventListener("click",async function(event){
if(event.target === this || event.target.hasAttribute("data-admin-close")){
closeAdminDialog();
return;
}

const action = event.target.dataset.galleryDialogAction;
const coverPhotoId =
event.target.closest("[data-cover-photo-id]")?.dataset.coverPhotoId;

try{
if(action === "save-category-upload"){
const input = document.getElementById("galleryCategoryUploadInput");
const files = Array.from(input?.files || []);

if(files.length===0){
alert("Choose image first");
return;
}

const data = await uploadCategoryFiles(activeAdminCategory,files);
alert(data.message || "Gallery image uploaded");
await reloadGallery();
closeAdminDialog();
return;
}

if(action === "upload-cover-file"){
document.getElementById("galleryCoverUploadInput").click();
return;
}

if(coverPhotoId){
const res = await fetch("/category-covers",{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
category:activeAdminCategory,
photoId:coverPhotoId
})
});

const data = await readJsonResponse(res);
alert(data.message || "Display image updated");
await reloadGallery();
closeAdminDialog();
}
}catch(err){
alert(err.message || "Update failed");
}
});

document.getElementById("galleryAdminDialog").addEventListener("change",async function(event){
if(event.target.id !== "galleryCoverUploadInput"){
return;
}

try{
const files = Array.from(event.target.files || []);

if(files.length===0){
return;
}

const data = await uploadCategoryFiles(activeAdminCategory,[files[0]]);
const photoId = Array.isArray(data.ids) ? data.ids[0] : null;

if(!photoId){
throw new Error("Display image uploaded, but could not select it automatically");
}

const res = await fetch("/category-covers",{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
category:activeAdminCategory,
photoId
})
});

const coverData = await readJsonResponse(res);
alert(coverData.message || "Display image updated");
await reloadGallery();
closeAdminDialog();
}catch(err){
alert(err.message || "Upload failed");
}
});

document.getElementById("photoViewer").addEventListener("click",function(event){
if(event.target === this){
closePhotoViewer();
}
});

document.addEventListener("click",function(event){
if(!document.getElementById("galleryAdminMenu").contains(event.target)){
closeAdminMenu();
}
});

</script>

</body>

</html>
