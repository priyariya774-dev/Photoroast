<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Manage Categories

</title>
<script src="../error-handler.js"></script>
<script src="admin-refresh.js"></script>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial;
background:#f5f5f5;

padding:0 14px 14px;

}

.admin-nav{
position:sticky;
top:0;
z-index:50;
margin:0 -14px 14px;
padding:10px 14px;
background:#f5f5f5;
border-bottom:1px solid #ddd;
display:grid;
grid-template-columns:auto 1fr auto;
gap:8px;
align-items:center;
}

.nav-btn{
min-height:40px;
display:flex;
align-items:center;
justify-content:center;
padding:9px 12px;
border:1px solid #ddd;
background:#fff;
color:#111;
text-decoration:none;
font-size:13px;
font-weight:bold;
}

.admin-nav strong{
text-align:center;
font-size:15px;
}


/* container */

.container{

background:white;

padding:20px;

border-radius:12px;

max-width:700px;

margin:auto;

box-shadow:
0 2px 10px
rgba(0,0,0,.1);

}


/* top */

.top{

display:flex;

justify-content:
space-between;

align-items:center;

gap:10px;

flex-wrap:wrap;

}

.top h1{
font-size:24px;
line-height:1.15;
}


.logout{

padding:10px 14px;

border:none;

background:black;

color:white;

border-radius:8px;

cursor:pointer;

}


/* input row */

.row{

display:grid;
grid-template-columns:1fr;

gap:10px;

margin-top:20px;

}


.row input{

flex:1;

padding:12px;

border:

1px solid #ccc;

border-radius:8px;

min-width:0;

}


.add-btn{

padding:12px 18px;

background:green;

color:white;

border:none;

border-radius:8px;

cursor:pointer;

}


/* category cards */

.category{

margin-top:15px;

padding:15px;

background:#fafafa;

border-radius:10px;

display:flex;

justify-content:
space-between;

align-items:flex-start;

gap:10px;

word-break:break-word;
flex-direction:column;

}

.category span{
font-weight:bold;
line-height:1.35;
}

.category-actions{
display:grid;
grid-template-columns:1fr;
gap:8px;
width:100%;
}


.delete{

background:red;

color:white;

border:none;

padding:8px 12px;

border-radius:8px;

cursor:pointer;

}

/* Tablet */

@media(min-width:768px){

.container{

padding:30px;

}

.row{
grid-template-columns:minmax(0,1fr) auto;
}

.category{
flex-direction:row;
align-items:center;
}

.category span{
flex:1;
}

.category-actions{
width:auto;
display:flex;
align-items:center;
justify-content:flex-end;
}

.delete{
white-space:nowrap;
}

.cover-grid{
grid-template-columns:repeat(3,minmax(0,1fr));
}

}



/* Desktop */

@media(min-width:1024px){

.container{

max-width:800px;

}

}

</style>

<link rel="stylesheet" href="../style.css">

</head>



<body>


<script>

if(
localStorage.getItem("auth")
!== "true"
&&
!localStorage.getItem("adminToken")
){

window.location.href =
"login.html";

}

</script>

<div class="admin-nav">
<a class="nav-btn" href="javascript:history.back()">‹ Back</a>
<strong>Categories</strong>
<a class="nav-btn" href="dashboard.html" data-admin-fresh="1">Dashboard</a>
</div>


<div class="container">


<div class="top">

<h1>

Manage Categories

</h1>


<button
class="logout"
onclick="logout()">

Logout

</button>

</div>




<div class="row">

<input
id="categoryName"
placeholder=
"Add new category">


<button
class="add-btn"
onclick=
"addCategory()">

Add

</button>

</div>



<div id="list">

</div>

</div>




<script>

function normalizeCategory(value){
return String(value || "")
.trim()
.toLowerCase()
.replace(/[\s_-]+/g," ");
}

async function logout(){
try{
await fetch("/logout",{method:"POST"});
}catch(err){}
localStorage.removeItem("auth");
localStorage.removeItem("adminToken");
window.location.href="login.html";
}




async function loadCategories(){

const response =
await fetch(

"/categories"

);


const data =
await response.json();


const list =
document.getElementById(
"list"
);

list.innerHTML="";


data.forEach(cat=>{

list.innerHTML += `

<div class="category">

<span>

${cat.name}

</span>

<div class="category-actions">

<button

class="delete"

onclick=
"deleteCategory(${cat.id})">

Delete

</button>

</div>

</div>

`;

});

}

async function addCategory(){

const name =

document
.getElementById(
"categoryName"
).value;


if(!name){

return alert(
"Enter category"
);

}


await fetch(

"/categories",

{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:

JSON.stringify({

name

})

}

);


document
.getElementById(
"categoryName"
).value="";


loadCategories();

}



async function deleteCategory(id){

await fetch(

`/categories/${id}`,

{
method:"DELETE"
}

);

loadCategories();

}


loadCategories();

</script>

</body>

</html>
