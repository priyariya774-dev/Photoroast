<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<script src="../error-handler.js"></script>
<script src="admin-refresh.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
body{min-height:100vh;background:#f6f4ef;color:#171717}
.shell{width:100%;max-width:860px;margin:0 auto;padding:14px}
.topbar{position:sticky;top:0;z-index:20;margin:0 -14px 14px;padding:12px 14px;background:#f6f4ef;border-bottom:1px solid #e4dfd4;display:flex;align-items:center;justify-content:space-between;gap:10px}
h1{font-family:Georgia,'Times New Roman',serif;font-size:24px;line-height:1.1}
.logout{min-height:40px;padding:9px 12px;border:1px solid #d8d1c6;background:#fff;color:#b00020;font-weight:700;cursor:pointer}
.button-grid{display:grid;grid-template-columns:1fr;gap:10px}
.dash-button{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:62px;padding:16px;background:#fff;color:#171717;text-decoration:none;border:1px solid #e2dbcf;font-weight:800;font-size:16px;box-shadow:0 8px 22px rgba(0,0,0,.05)}
.dash-button span{font-size:22px;line-height:1}
.dash-button:hover{border-color:#171717}
@media(min-width:720px){
.shell{padding:24px}
.topbar{margin:0 -24px 22px;padding:16px 24px}
h1{font-size:30px}
.button-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.dash-button{min-height:76px;font-size:18px}
}
</style>
</head>
<body>
<script>
async function logout(){
try{
await fetch("/logout",{method:"POST"});
}catch(err){}

localStorage.removeItem("auth");
localStorage.removeItem("adminToken");
window.location.href = "login.html";
}

</script>

<main class="shell">
<div class="topbar">
<h1>Admin Dashboard</h1>
<button class="logout" type="button" onclick="logout()">Logout</button>
</div>

<nav class="button-grid" aria-label="Admin sections">
<a class="dash-button" href="../index.html?adminEdit=1" data-admin-fresh="1">Manage Homepage <span>&gt;</span></a>
<a class="dash-button" href="../client-gallery.html?adminEdit=1" data-admin-fresh="1">Manage Gallery <span>&gt;</span></a>
<a class="dash-button" href="media.html?mode=videos" data-admin-fresh="1">Manage Videos / YouTube Links <span>&gt;</span></a>
<a class="dash-button" href="catagories.html" data-admin-fresh="1">Manage Category <span>&gt;</span></a>
<a class="dash-button" href="../index.html?adminEdit=1&editArea=reviews#client-reviews" data-admin-fresh="1">Manage Reviews <span>&gt;</span></a>
<a class="dash-button" href="../career.html?adminEdit=1" data-admin-fresh="1">Manage Career <span>&gt;</span></a>
<a class="dash-button" href="../index.html?adminPreview=1" data-admin-fresh="1">Homepage Preview <span>&gt;</span></a>
</nav>
</main>
</body>
</html>
