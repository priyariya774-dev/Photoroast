<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reels - PhotoRoast</title>
<script src="error-handler.js"></script>
<script src="public-header.js" defer></script>
<link rel="stylesheet" href="style.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
padding:16px;
}

.page-shell{
width:100%;
max-width:1180px;
margin:0 auto;
}

.topbar{
display:flex;
align-items:center;
justify-content:flex-start;
gap:14px;
margin-bottom:24px;
}

h1{
font-size:30px;
line-height:1.1;
}

.back-link{
display:inline-flex;
align-items:center;
justify-content:center;
min-height:42px;
padding:10px 14px;
border-radius:14px;
text-decoration:none;
color:#160d0f;
background:linear-gradient(135deg,var(--accent-3),var(--accent-2),var(--accent));
font-weight:800;
box-shadow:0 12px 28px var(--shadow);
}

.reels-grid{
display:grid;
grid-template-columns:1fr;
gap:18px;
}

.reel-card{
border-radius:18px;
overflow:hidden;
background:#ffffff;
border:1px solid var(--line);
box-shadow:0 16px 42px rgba(0,0,0,.08);
}

.reel-media{
width:100%;
aspect-ratio:16/10;
background:#f1f1ed;
display:block;
}

.reel-media video,
.reel-media iframe{
width:100%;
height:100%;
border:0;
display:block;
object-fit:cover;
}

.reel-content{
padding:16px;
}

.reel-content h3{
font-size:18px;
margin-bottom:8px;
}

.reel-content p{
font-size:14px;
line-height:1.7;
}

.empty{
padding:28px;
text-align:center;
border-radius:18px;
background:rgba(255,255,255,.06);
border:1px solid var(--line);
color:var(--text-soft);
}

@media(min-width:768px){
body{
padding:24px;
}

h1{
font-size:42px;
}

.reels-grid{
grid-template-columns:repeat(2,minmax(0,1fr));
}
}

@media(min-width:1100px){
.reels-grid{
grid-template-columns:repeat(3,minmax(0,1fr));
}
}
</style>
</head>

<body>
<div class="page-shell">
<div class="topbar">
<h1>Reels</h1>
</div>

<div class="reels-grid" id="reelsGrid">
<div class="empty">Loading reels...</div>
</div>
</div>

<script>
function convertEmbed(url){
if(!url){
return "";
}

if(url.includes("instagram.com/")){
const cleanUrl =
url.split("?")[0].replace(/\/?$/,"/");

return cleanUrl.endsWith("/embed/")
? cleanUrl
: cleanUrl + "embed/";
}

let videoId = "";

if(url.includes("youtu.be/")){
videoId = url.split("youtu.be/")[1].split("?")[0];
}else if(url.includes("watch?v=")){
videoId = url.split("watch?v=")[1].split("&")[0];
}else if(url.includes("/shorts/")){
videoId = url.split("/shorts/")[1].split("?")[0];
}else if(url.includes("/embed/")){
return url;
}

return `https://www.youtube.com/embed/${videoId}?rel=0`;
}

function renderReels(videos){
const grid = document.getElementById("reelsGrid");
const reels =
(videos || []).filter(item=>
String(item.category || "").trim().toLowerCase() === "reels"
);

if(reels.length===0){
grid.innerHTML = `<div class="empty">No reel uploaded</div>`;
return;
}

grid.innerHTML = "";

reels.forEach(item=>{
const media =
item.type === "youtube"
? `
<iframe
src="${convertEmbed(item.youtube)}"
title="Reel"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
referrerpolicy="strict-origin-when-cross-origin"
allowfullscreen>
</iframe>
`
: `
<video controls>
<source src="/media-file/${item.id}">
</video>
`;

grid.innerHTML += `
<div class="reel-card">
<div class="reel-media">
${media}
</div>
<div class="reel-content">
<h3>${item.title || "Untitled Reel"}</h3>
<p>${item.description || ""}</p>
<p>${item.category || ""}</p>
</div>
</div>
`;
});
}

async function loadReels(){
try{
const res = await fetch("/videos?t=" + new Date().getTime());
const data = await res.json();
renderReels(data);
}catch(err){
console.log(err);
alert("Reels load failed");
}
}

loadReels();
</script>
</body>

</html>
